# Pre-commit sensors for Nelson.
#
# Install: `pre-commit install` (runs on every `git commit`).
# Run on demand: `pre-commit run --all-files`.
#
# Hook output is a sensor: when a commit is blocked, an agent reads the
# message and self-corrects. Treat failures as feedback, not as something
# to bypass with `--no-verify`. See CLAUDE.md → "Maintainability sensors".

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^demos/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
